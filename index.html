<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visita Iglesia 2026</title>

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(#f7f3f8, #efe6f3);
      color: white;
      text-align: center;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
      url('images/crown.jpg');

      background-size: cover;
      background-position: center;
      animation: zoom 18s ease-in-out infinite alternate;
    }

    @keyframes zoom {
      from { background-size: 100%; }
      to { background-size: 110%; }
    }

    h1 {
      font-size: 2.8rem;
      letter-spacing: 2px;
      text-shadow: 0 0 10px gold;
      margin-bottom: 10px;
    }

    .subtitle {
      font-style: italic;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .desc {
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 22px;
      border-radius: 10px;
      background: #7b4b7e;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #5e3661;
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<header>
  <h1>𝐕𝐈𝐒𝐈𝐓𝐀 𝐈𝐆𝐋𝐄𝐒𝐈𝐀 𝟐𝟎𝟐𝟔</h1>

  <div class="subtitle">
    "A Sacred Pilgrimage of Prayer and Reflection"
  </div>

  <div class="desc">
    March 29, 2026
  </div>

  <a class="btn" href="churches.html">Start Journey</a>
  <a class="btn" href="prayers.html">View Prayers</a>
</header>

</body>
</html>
